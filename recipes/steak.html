<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steak</title>
</head>
<body>
    <h1>Steak</h1>
    <img src="../img/steak.jpeg" alt="Steak">
    <h4>Description</h4>
    <p>A succulent piece of beef!</p>
    <h4>Ingredients</h4>
    <ul>
        <li>12oz NY Strip Steak</li>
        <li>Salt</li>
        <li>Pepper</li>
    </ul>
    <h4>Steps</h4>
    <ol>
        <li>Season with salt & pepper</li>
        <li>Heat grill to 400 degrees</li>
        <li>Sear one side for 8 min</li>
        <li>Sear other side for 6 min</li>
    </ol>
</body>
</html>
